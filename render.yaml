services:
  - type: web
    name: smart-farming
    runtime: python
    rootDir: .
    buildCommand: |
      pip install -r backend/requirements.txt
      cd frontend && npm install && npm run build
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE_HOURS
        value: "72"
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
